<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fbff"/>
      <stop offset="100%" style="stop-color:#edf6ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f3f9ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0c4a6e"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="20%" cy="25%" r="60%">
      <stop offset="0%" style="stop-color:rgba(56,189,248,0.22)"/>
      <stop offset="100%" style="stop-color:rgba(56,189,248,0)"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="80%" r="45%">
      <stop offset="0%" style="stop-color:rgba(14,165,233,0.16)"/>
      <stop offset="100%" style="stop-color:rgba(14,165,233,0)"/>
    </radialGradient>
    <pattern id="dotGrid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#d7e8f7"/>
