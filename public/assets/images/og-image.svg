  <text x="112" y="270" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="82" font-weight="800" fill="url(#name-grad)">Software Engineer</text>
  <text x="112" y="343" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="82" font-weight="800" fill="url(#name-grad)">in Glasgow</text>

  <text x="112" y="416" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="27" font-weight="500" fill="#334155">Graduate apprentice at Leidos and final-year</text>
  <text x="112" y="454" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="27" font-weight="500" fill="#334155">University of Glasgow software engineering student.</text>

  <rect x="112" y="495" width="238" height="42" rx="21" fill="#e0f2fe"/>
  <text x="138" y="522" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" font-weight="600" fill="#0369a1">ronan-peacock.com</text>

  <text x="387" y="522" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="20" fill="#64748b">4 years industry experience</text>
