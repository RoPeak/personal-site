  <rect width="1200" height="630" fill="url(#glowRight)"/>
  <rect width="1200" height="630" fill="url(#dotGrid)" opacity="0.45"/>

  <rect x="52" y="52" width="1096" height="526" rx="34" fill="url(#panel)" stroke="#d8e9f7" stroke-width="2"/>

  <circle cx="1010" cy="146" r="124" fill="rgba(14,165,233,0.08)"/>
  <circle cx="1038" cy="168" r="90" fill="rgba(14,165,233,0.1)"/>
  <circle cx="1060" cy="188" r="42" fill="url(#accent)"/>

